
<div class="skills-lens-container">
  <style>
    :root {
      --bg: #0d1117;
      --border: #30363d;
      --text-main: #c9d1d9;
      --accent: #36BCF7;
      --lens-bg: rgba(54, 188, 247, 0.08);
    }

    .skills-lens-container {
      background-color: var(--bg);
      font-family: 'SFMono-Regular', Consolas, monospace;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      max-width: 850px;
    }

    .skill-row {
      display: flex;
      align-items: center;
      height: 60px;
      border-bottom: 1px solid rgba(48, 54, 61, 0.5);
      position: relative;
      overflow: hidden;
    }

    /* 🔥 CATEGORY = SAME WEIGHT AS FOCUSED ITEM */
    .category-label {
      width: 220px;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding-right: 15px;
      display: flex;
      align-items: center;
    }

    .lens-viewport {
      flex-grow: 1;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      mask-image: linear-gradient(to right, transparent, black 35%, black 65%, transparent);
    }

    .marquee-track {
      display: flex;
      gap: 50px;
      padding-left: 50%;
      white-space: nowrap;
      will-change: transform;
    }

    /* 🧠 BASE STATE (VISIBLE BUT SUBTLE) */
    .skill-item {
      font-size: 16px;
      color: #8b949e;
      opacity: 0.55;
      transform: scale(0.9);
      transition: transform 0.15s linear, opacity 0.15s linear;
      text-transform: capitalize;
    }

    /* 🎯 LENS */
    .focal-point {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 36px;
      border: 1px solid var(--accent);
      background: var(--lens-bg);
      border-radius: 6px;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 0 20px rgba(54,188,247,0.2);
    }

    .skill-row:hover .marquee-track {
      animation-play-state: paused;
    }
  </style>

  <!-- ROW -->
  <div class="skill-row">
    <div class="category-label">System Design</div>
    <div class="focal-point"></div>
    <div class="lens-viewport">
      <div class="marquee-track">
        <span class="skill-item">Distributed Architectures</span>
        <span class="skill-item">High Availability Systems</span>
        <span class="skill-item">Scalable Backend Design</span>
        <span class="skill-item">Load Balancing</span>
        <span class="skill-item">Microservices</span>
      </div>
    </div>
  </div>

  <div class="skill-row">
    <div class="category-label">Backend & Infra</div>
    <div class="focal-point"></div>
    <div class="lens-viewport">
      <div class="marquee-track">
        <span class="skill-item">Production APIs</span>
        <span class="skill-item">Node.js</span>
        <span class="skill-item">Fastify / Flask</span>
        <span class="skill-item">Data Pipelines</span>
        <span class="skill-item">Redis Caching</span>
      </div>
    </div>
  </div>

  <div class="skill-row">
    <div class="category-label">AI Systems</div>
    <div class="focal-point"></div>
    <div class="lens-viewport">
      <div class="marquee-track">
        <span class="skill-item">RAG Platforms</span>
        <span class="skill-item">LLM Orchestration</span>
        <span class="skill-item">LangChain</span>
        <span class="skill-item">Vector Databases</span>
        <span class="skill-item">AI Agents</span>
      </div>
    </div>
  </div>

  <!-- SCRIPT -->

<script>
function initMarqueeSpeed() {
  document.querySelectorAll(".marquee-track").forEach(track => {
    const width = track.scrollWidth;
    const speed = 80;
    const duration = width / speed;

    track.style.animation = `scroll linear infinite`;
    track.style.animationDuration = duration + "s";
  });
}

function updateLensEffect() {
  document.querySelectorAll(".skill-row").forEach(row => {
    const lens = row.querySelector(".focal-point");
    const items = row.querySelectorAll(".skill-item");

    const lensRect = lens.getBoundingClientRect();
    const center = lensRect.left + lensRect.width / 2;

    let maxFocus = 0;

    items.forEach(item => {
      const rect = item.getBoundingClientRect();
      const itemCenter = rect.left + rect.width / 2;

      const distance = Math.abs(center - itemCenter);
      const maxDist = 180;

      let focus = 1 - (distance / maxDist);
      focus = Math.max(0, focus);

      maxFocus = Math.max(maxFocus, focus);

      /* 🔥 SMOOTH VISUALS */
      const scale = 0.9 + (0.5 * focus);
      const opacity = 0.45 + (0.55 * focus);

      item.style.transform = `scale(${scale})`;
      item.style.opacity = opacity;

      /* 🎯 COLOR + WEIGHT ONLY (NO CASE CHANGE) */
      if (focus > 0.6) {
        item.style.color = "#36BCF7";
        item.style.fontWeight = "700";
      } else {
        item.style.color = "#8b949e";
        item.style.fontWeight = "400";
      }
    });

    /* 🔥 DYNAMIC LENS SIZE */
    const minWidth = 140;
    const maxWidth = 260;

    const targetWidth = minWidth + (maxWidth - minWidth) * maxFocus;

    const currentWidth = lens.offsetWidth;
    const smoothWidth = currentWidth + (targetWidth - currentWidth) * 0.15;

    lens.style.width = smoothWidth + "px";
  });

  requestAnimationFrame(updateLensEffect);
}

/* KEYFRAMES */
const styleSheet = document.createElement("style");
styleSheet.innerHTML = `
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}`;
document.head.appendChild(styleSheet);

initMarqueeSpeed();
updateLensEffect();
</script>
</div>
